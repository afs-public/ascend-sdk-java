// of string where each string value is an additional line in the block) in gen.yaml.
////////////////////////////////////////////////////////////////////////////////////////////

plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id "com.adarshr.test-logger" version "4.0.0"
}

compileJava.options.encoding = "UTF-8"
compileJava.options.compilerArgs += '-Xlint:unchecked'
compileTestJava.options.encoding = "UTF-8"

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

java {
    withSourcesJar()
    withJavadocJar()
}

model {
    tasks.generatePomFileForMavenPublication {
        destination = file("$buildDir/pom.xml")
    }
}

jar {
    dependsOn(":generatePomFileForMavenPublication")

    into("META-INF/maven/com.apexfintechsolutions/ascendsdk") {
        from("$buildDir/pom.xml")
    }
}

javadoc {
    options.encoding = "UTF-8"

    if(JavaVersion.current().isJava9Compatible()) {
        options.addBooleanOption('html5', true)
    }
    options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(Javadoc) {
  failOnError = false
  options.addStringOption('Xdoclint:none', '-quiet')
}

tasks.withType(JavaCompile).configureEach {
    options.release = 11
}

sourcesJar {
    archiveBaseName = "ascendsdk"
}

javadocJar {
    archiveBaseName = "ascendsdk"
}


publishing {

    publications {
        maven(MavenPublication) {
            // note that properties can't yet be used below!
            // https://github.com/gradle/gradle/issues/18619
            groupId = "com.apexfintechsolutions"
            artifactId = "ascendsdk"
            version = "1.6.2"

            from components.java

            pom {
                properties = [
                    'maven.compiler.source': '11',
                    'maven.compiler.target': '11',
                ]
                name = 'Apex Fintech Solutions Java SDK'
                description = 'SDK enabling Java developers to easily integrate with the Apex Fintech Solutions API.'
                url = 'https://github.com/owner/repo'
                scm {
                    url = 'github.com/owner/repo'
                    connection = 'scm:git:ssh://git@github.com/owner/repo.git'
                }
                licenses {
                    license {
                        name = 'The MIT License (MIT)'
                        url = 'https://mit-license.org/'
                    }
                }
                developers {
                    developer {
                        name = 'Apex Fintech Solutions'
                        organization = 'Apex Fintech Solutions'
                        email = 'clientdevelopertools@apexfintechsolutions.com'
                    }
                }
                organization {
                    name = 'Apex Fintech Solutions'
                    url = 'www.apexfintechsolutions.com'
                }
            }
        }
    }
}

if (!project.hasProperty('skip.signing')) {
    signing {
        def signingKey = findProperty("signingKey")
        def signingPassphrase = findProperty("signingPassphrase")
        useInMemoryPgpKeys(signingKey, signingPassphrase)
        sign publishing.publications.maven
    }
}


tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

testlogger  {
    showStandardStreams = true
}

test {
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
    finalizedBy 'mergeJUnitReports'
}

configurations {
    antJUnit
}

task mergeJUnitReports {
    ext {
        resultsDir = file("$buildDir/test-results/test")
        targetDir = file(".speakeasy/reports")
    }

    doLast {
        ant.taskdef(
            name: 'junitreport',
            classname: 'org.apache.tools.ant.taskdefs.optional.junit.XMLResultAggregator',
            classpath: configurations.antJUnit.asPath
        )

        mkdir targetDir

        ant.junitreport(todir: targetDir, tofile: 'tests.xml') {
            fileset(dir: resultsDir, includes: 'TEST-*.xml')
        }
    }
}


dependencies {
    implementation 'com.nimbusds:nimbus-jose-jwt:9.9.3'
    implementation 'javax.servlet:javax.servlet-api:3.1.0'
    api 'com.fasterxml.jackson.core:jackson-annotations:2.18.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.2'
    api('org.openapitools:jackson-databind-nullable:0.2.6') {exclude group: 'com.fasterxml.jackson.core', module: 'jackson-databind'}
    implementation 'commons-io:commons-io:2.18.0'
    implementation 'com.jayway.jsonpath:json-path:2.9.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testImplementation 'org.mockito:mockito-core:5.14.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.11.4'
    antJUnit 'org.apache.ant:ant-junit:1.9.7'
}

apply from: 'build-extras.gradle'
